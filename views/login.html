<script type="text/javascript">
  


//login

  
    function login() {
  // Mengambil nilai dari input form
  var username = $("#username").val();
  var password = $("#password").val();

  // Membuat objek data untuk dikirim ke server
  var data = {
    username: username,
    password: password,
  };

  // Mengirim data ke server menggunakan AJAX
  $.ajax({
    url: "/login_form", // Ganti dengan URL yang sesuai
    method: "POST", // Menggunakan metode POST untuk menambahkan data
    dataType: "JSON",
    data: data,
    success: function(json) {
      

          if(json.status == 1){

             Swal.fire({
                    title: "Berhasil!",
                    text: "Registrasi Akun Berhasil!",
                    icon: "success"
                  });
              setTimeout(function() {
                  window.location.href = '/';

              }, 2000);
        }else{
           Swal.fire({
            title: "Gagal!",
            text: "Username/Password Salah. Silahkan Ulangi!",
            icon: "error"
          });
        }
      
      
    },
    error: function(error) {
      // Menangani kesalahan jika ada
      console.error("Gagal Login:", error);
      alert("Username Atau Password salah!")
    },
  });
}
</script>
