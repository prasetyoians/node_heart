<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Register TrackHer</title>
  <!-- plugins:css -->
  <link rel="stylesheet" href="../../vendors/feather/feather.css">
  <link rel="stylesheet" href="../../vendors/ti-icons/css/themify-icons.css">
  <link rel="stylesheet" href="../../vendors/css/vendor.bundle.base.css">
  <!-- endinject -->
  <!-- Plugin css for this page -->
  <!-- End plugin css for this page -->
  <!-- inject:css -->
  <link rel="stylesheet" href="../../css/vertical-layout-light/style.css">
  <!-- endinject -->
  <link rel="shortcut icon" href="../../images/favicon.png" />

  <!-- Plugin css for this page -->
  <link rel="stylesheet" href="../../vendors/select2/select2.min.css">
  <link rel="stylesheet" href="../../vendors/select2-bootstrap-theme/select2-bootstrap.min.css">
</head>

<body >
  <style type="text/css">
     .select2-container--default .select2-selection--single {
      height: 50px; /* Sesuaikan dengan tinggi yang diinginkan */
    }
  </style>
  <div class="container-scroller bg-success " >
    <div class="container-fluid page-body-wrapper full-page-wrapper" >
      <div class="content-wrapper d-flex align-items-center auth px-0" style="background-color: rgb(240,240,240);">
        <div class="row w-100 mx-0"  >
          <div class="col-lg-8 mx-auto" >
            <div class="auth-form-light text-left px-4 px-sm-5" style="border-radius: 10px; box-shadow: 0 0 5px silver">
              <div class="brand-logo">
                <img src="images/logo_all.png" style="width: 220px;height: 100px;" alt="logo">
              </div>
              <h3 class="font-weight-light"><b>Registrasikan Akun anda!</b></h3>

               <div class="form-group">
                      <label class="form-label">Nama</label>

                  <input type="text" class="form-control form-control-lg" placeholder="Masukan Nama Anda..." name="nama" id="nama">
                </div>

                <div class="form-group">
                      <label class="form-label">Username</label>

                  <input type="text" class="form-control form-control-lg" placeholder="Masukan Username..." name="username" id="username">
                </div>
                <div class="form-group">
                      <label class="form-label">Password</label>

                  <input type="password" class="form-control form-control-lg" placeholder="Masukan Password..." name="password" id="password">
                </div>


                <div class="form-group">
                  <p>Usia Kehamilan Anda</p>
                  <div class="row">
                    <div class="col-4">
                      <label class="form-label">Bulan</label>
                      <input type="number" name="bulan" id="bulan" class="form-control">
                    </div>
                    <div class="col-6">
                      <label>Hari</label>
                      <input type="number" name="hari" id="hari" class="form-control">
                    </div>
                  </div>
                </div>

                <div class="form-group">
                      <label class="form-label">Nomor Barcode Alat</label>

                  <select class="form-control js-example-basic-single" id="id_alat" name="id_alat" style="height: 200px !important;">
                      <option value="0" selected="" disabled="">--Pilih Nomor Barcode pada alat yang anda pakai--</option>
                      <%  for(var i = 0; i< data.length; i++) { %>
                      <option value="<%= data[i].id_alat%>"><%= data[i].kode_alat%></option>
                      <% }  %>

                  </select>
                </div>


                <div class="mt-3">
                  <button  class="btn btn-block btn-danger btn-lg font-weight-medium auth-form-btn" onclick="register()" >Bergabung!</button>
                </div>

               
               
                <br>
                <br>
            </div>
          </div>
        </div>
      </div>
      <!-- content-wrapper ends -->
    </div>
    <!-- page-body-wrapper ends -->
  </div>
  <!-- container-scroller -->
  <!-- plugins:js -->
  <script src="../../vendors/js/vendor.bundle.base.js"></script>
  <!-- endinject -->
  <!-- Plugin js for this page -->
  <!-- End plugin js for this page -->
  <!-- inject:js -->
  <script src="../../js/off-canvas.js"></script>
  <script src="../../js/hoverable-collapse.js"></script>
  <script src="../../js/template.js"></script>
  <script src="../../js/settings.js"></script>
  <script src="../../js/todolist.js"></script>
  <script src="../../vendors/select2/select2.min.js"></script>
    <script src="../../js/select2.js"></script>

  <!-- endinject -->
</body>

</html>
<script type="text/javascript">
  


//login
  
    function register() {
  // Mengambil nilai dari input form
  var username = $("#username").val();
  var password = $("#password").val();
  var nama = $("#nama").val();
  var hari = $("#hari").val();
  var bulan = $("#bulan").val();
  var id_alat = $("#id_alat").val();

  // Membuat objek data untuk dikirim ke server
  var data = {
    username: username,
    password: password,
    nama: nama,
    bulan: bulan,
    hari: hari,
    id_alat: id_alat,
  };

  // Mengirim data ke server menggunakan AJAX
  $.ajax({
    url: "/register_form", // Ganti dengan URL yang sesuai
    method: "POST", // Menggunakan metode POST untuk menambahkan data
    dataType: "JSON",
    data: data,
    success: function(json) {
      

          if(json.status == 1){

      console.log("Register Berhasil!");
      alert("Berhasil Nambah USER");
      setTimeout(function() {
          window.location.href = '/login';

      }, 2000);
        }else{
          alert("Register Gagal")
        }
      
      
    },
    error: function(error) {
      // Menangani kesalahan jika ada
      console.error("Gagal:", error);
      alert("Gagal !")
    },
  });
}
</script>
